# The endpoint name of this server/proxy instance registered on startup with the Connect network.
# Default is a random string. You can change it to a custom endpoint name.
endpoint: ${endpoint}

# This setting is only relevant if you want to allow cracked players to join.
# This should not be irritated by offline-mode servers behind an online-mode proxy, keep this setting disabled.
# If left blank, the correct mode will be securely detected automatically.
allow-offline-mode-players: false

# Super endpoints are authorized to control this endpoint via Connect API.
# e.g. disconnect players from this endpoint, send messages to players, etc.
#
# You can add as many super endpoint names as you want.
#super-endpoints:
#  - pvp-endpoint
#  - someones-hub

# Moxy can attach a signed Bedrock/Xbox identity envelope to Bedrock sessions.
# Keep enforcement disabled unless Minekube provided the current public key.
bedrock-identity:
  # disabled: do not verify or reject
  # warn: verify when public-key is configured and log failures, but allow the session
  # require: reject Bedrock sessions with missing or invalid identity envelopes
  enforcement: disabled
  # Base64-encoded Ed25519 public key. Supports raw 32-byte and X.509 encoded keys after decoding.
  public-key: ""
  # Additional Base64-encoded Ed25519 public keys accepted during key rotation.
  public-keys: []
  # Public metadata URL for Moxy verifier keys. Prefer this once Minekube publishes it.
  metadata-url: ""
  # Seconds to cache successful verifier metadata.
  metadata-cache-seconds: 300
  # Expected Connect Edge Bedrock authentication policy.
  expected-policy: trusted_bedrock_xuid

# The default locale for Connect. By default, Connect uses the system locale
#default-locale: en_US

# bStats is a stat tracker that is entirely anonymous and tracks only basic information
# about Connect, such as how many people are online, how many servers are using Connect,
# what OS is being used, etc. You can learn more about bStats here: https://bstats.org/.
metrics:
  # If metrics should be disabled.
  disabled: false
  # The unique id that should be consistent for a server/proxy.
  uuid: ${metrics.uuid}

# Do not change this
config-version: 1
